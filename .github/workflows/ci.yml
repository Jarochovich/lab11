name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # БЛОК 1: СБОРКА (BUILD)
  # ============================================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Клонирование кода
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Установка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      # 3. Установка зависимостей (frontend)
      - name: Install dependencies
        run: npm install
      
      # 4. Сборка React приложения
      - name: Build React app
        run: npm run build
      
      # 5. Сохранение артефактов сборки для следующей джобы
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/

  # ============================================================
  # БЛОК 2: ТЕСТИРОВАНИЕ (TEST)
  # ============================================================
  test:
    runs-on: ubuntu-latest
    needs: build  # 👈 Запускается ТОЛЬКО после успешного build
    
    steps:
      # 1. Клонирование кода (нужен для доступа к test-файлам)
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Скачивание артефактов сборки (чтобы убедиться, что билд работает)
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/
      
      # 3. Установка Node.js для запуска dev сервера
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      # 4. Установка зависимостей (нужны для npm start)
      - name: Install dependencies
        run: npm install
      
      # 5. Запуск unit-тестов (Jest + React Testing Library)
      - name: Run unit tests
        run: npm test -- --watchAll=false --passWithNoTests
      
      # 6. Установка Python и зависимостей для Selenium
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          pip install pytest selenium webdriver-manager
      
      # 7. Запуск React dev server (в фоновом режиме)
      - name: Start React dev server
        run: npm start &
      
      # 8. Ожидание загрузки сервера
      - name: Wait for server
        run: sleep 15
      
      # 9. Запуск Selenium-тестов против dev сервера
      - name: Run Selenium tests
        run: pytest test/ -v

  # ============================================================
  # БЛОК 3: ДЕПЛОЙ НА GITHUB PAGES (только для ветки main)
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: test  # 👈 Запускается ТОЛЬКО после успешного test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    
    steps:
      # 1. Клонирование кода
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Скачивание артефактов сборки (чтобы не собирать заново)
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/
      
      # 3. Добавление .nojekyll (чтобы GitHub не игнорировал папки с _)
      - name: Add .nojekyll file
        run: touch ./build/.nojekyll
      
      # 4. Деплой на ветку gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
