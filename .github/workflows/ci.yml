name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # БЛОК 1: СБОРКА (BUILD)
  # ============================================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build React app
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/

  # ============================================================
  # БЛОК 2: ФУНКЦИОНАЛЬНОЕ ТЕСТИРОВАНИЕ (UNIT + SELENIUM)
  # ============================================================
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run unit tests
        run: npm test -- --watchAll=false --passWithNoTests
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          pip install pytest selenium webdriver-manager
      
      - name: Start React dev server
        run: npm start &
      
      - name: Wait for server
        run: sleep 15
      
      - name: Run Selenium tests
        run: pytest test/ -v

  # ============================================================
  # БЛОК 3: НАГРУЗОЧНОЕ ТЕСТИРОВАНИЕ (k6)
  # ============================================================
  load-test:
    runs-on: ubuntu-latest
    needs: [build, test]
    # needs: build  # 👈 Запускается после build (можно параллельно с test)
    # Если хотите запускать ТОЛЬКО после успешного test:
    
    steps:
      # 1. Клонирование кода (нужен для доступа к тестам k6)
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Установка k6
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      # 3. Запуск React dev server (если нужен для нагрузочных тестов)
      - name: Start React dev server
        run: npm start &
      
      # 4. Ожидание загрузки сервера
      - name: Wait for server
        run: sleep 15
      
      # 5. Запуск нагрузочного теста
      - name: Run k6 load test
        run: k6 run load-test/k6-script.js
      
      # 6. (Опционально) Сохранение отчета о нагрузке
      - name: Upload k6 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: |
            report.html
            summary.json

  # ============================================================
  # БЛОК 4: ДЕПЛОЙ НА GITHUB PAGES
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [test, load-test]  # 👈 Ждёт ОБА теста
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/
      
      - name: Add .nojekyll file
        run: touch ./build/.nojekyll
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
